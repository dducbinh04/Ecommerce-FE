services:
  nginx:
    image: nginx:alpine
    container_name: ecom-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api-gateway
    networks:
      - app-network

  api-gateway:
    build:
      context: ./BE/api-gateway
      dockerfile: Dockerfile
    container_name: ecom-api-gateway
    working_dir: /app
    ports:
      - "8080:8080"
      - "8000:8000"
    environment:
      JAVA_TOOL_OPTIONS: -Djava.net.preferIPv4Stack=true
    env_file:
      - ./BE/api-gateway/.env
    networks:
      - app-network

  auth-service:
    build:
      context: ./BE/auth-service
      dockerfile: Dockerfile
    container_name: ecom-auth-service
    working_dir: /app
    ports:
      - "8081:8081"
      - "8001:8001"
    environment:
      JAVA_TOOL_OPTIONS: -Djava.net.preferIPv4Stack=true
    env_file:
      - ./BE/auth-service/.env
    networks:
      - app-network

  user-service:
    build:
      context: ./BE/user-service
      dockerfile: Dockerfile
    container_name: ecom-user-service
    working_dir: /app
    ports:
      - "8082:8082"
      - "8002:8002"
    environment:
      JAVA_TOOL_OPTIONS: -Djava.net.preferIPv4Stack=true
    env_file:
      - ./BE/user-service/.env
    networks:
      - app-network

  product-service:
    build:
      context: ./BE/product
      dockerfile: Dockerfile
    container_name: ecom-product-service
    working_dir: /app
    ports:
      - "8083:8083"
      - "8003:8003"
    environment:
      JAVA_TOOL_OPTIONS: -Djava.net.preferIPv4Stack=true
    env_file:
      - ./BE/product/.env
    networks:
      - app-network

  cloudinary-service:
    build:
      context: ./BE/cloudinary
      dockerfile: Dockerfile
    container_name: ecom-cloudinary-service
    working_dir: /app
    ports:
      - "8084:8084"
      - "8004:8004"
    environment:
      JAVA_TOOL_OPTIONS: -Djava.net.preferIPv4Stack=true
    env_file:
      - ./BE/cloudinary/.env
    networks:
      - app-network
  
  category-service:
    build:
      context: ./BE/category-service
      dockerfile: Dockerfile
    container_name: ecom-category-service
    working_dir: /app
    ports:
      - "8085:8085"
      - "8005:8005"
    environment:
      JAVA_TOOL_OPTIONS: -Djava.net.preferIPv4Stack=true
    env_file:
      - ./BE/category-service/.env
    networks:
      - app-network


networks:
  app-network:
    driver: bridge